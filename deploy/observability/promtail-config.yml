server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: mikro-living-info
    static_configs:
      - targets: [localhost]
        labels:
          job: mikro-living
          log_type: info
          __path__: /var/www/mikro_living/logs/app-info.log*
    pipeline_stages:
      - json:
          expressions:
            ts: '@timestamp'
            level: log.level
            message: message
            service_name: service.name
            service_environment: service.environment
            request_id: meta.request_id
      - labels:
          level:
          service_name:
          service_environment:
          request_id:
      - timestamp:
          source: ts
          format: RFC3339
      - output:
          source: message

  - job_name: mikro-living-error
    static_configs:
      - targets: [localhost]
        labels:
          job: mikro-living
          log_type: error
          __path__: /var/www/mikro_living/logs/app-error.log*
    pipeline_stages:
      - json:
          expressions:
            ts: '@timestamp'
            level: log.level
            message: message
            service_name: service.name
            service_environment: service.environment
            request_id: meta.request_id
      - labels:
          level:
          service_name:
          service_environment:
          request_id:
      - timestamp:
          source: ts
          format: RFC3339
      - output:
          source: message
